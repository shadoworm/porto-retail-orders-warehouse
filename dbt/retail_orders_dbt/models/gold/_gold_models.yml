version: 2

models:
  - name: fact_order_items
    description: One row per item inside an order.
    columns:
      - name: order_item_id
        tests: [not_null, unique]
      - name: order_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]

  - name: dim_date
    columns:
      - name: date_key
        tests: [not_null, unique]
