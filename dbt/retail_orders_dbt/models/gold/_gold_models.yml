version: 2

models:
  - name: fact_order_items
    description: One row per item inside an order.
    columns:
      - name: order_item_id
        tests: [not_null, unique]
      - name: order_id
        tests: [not_null]
      - name: product_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_product')
                field: product_id
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_id
      - name: store_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_store')
                field: store_id
      - name: date_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

  - name: dim_date
    columns:
      - name: date_key
        tests: [not_null, unique]

  - name: dim_customer
    columns:
      - name: customer_id
        tests: [not_null, unique]

  - name: dim_product
    columns:
      - name: product_id
        tests: [not_null, unique]

  - name: dim_store
    columns:
      - name: store_id
        tests: [not_null, unique]

  - name: dim_payment_method
    columns:
      - name: payment_method
        tests: [not_null, unique]
