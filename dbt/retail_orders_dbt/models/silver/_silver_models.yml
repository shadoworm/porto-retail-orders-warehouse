version: 2

models:
  - name: stg_orders
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: order_status
        tests:
          - accepted_values:
              values: ['completed', 'cancelled', 'returned']

  - name: stg_order_items
    columns:
      - name: order_item_id
        tests: [not_null, unique]
      - name: net_amount
        tests: [not_null]
